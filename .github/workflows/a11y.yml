name: Accessibility Audit
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  security-events: write
  contents: read
jobs:
  a11y:
    name: A11ySentry Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/angular ./adapters/blazor ./adapters/django ./adapters/dotnet ./adapters/electron ./adapters/flask ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/pyqt ./adapters/reactnative ./adapters/unity ./adapters/vue ./adapters/web
      - name: Build A11ySentry
        run: go build -o a11ysentry ./cmd/a11ysentry
        env:
          GOWORK: ${{ github.workspace }}/go.work
      - name: Add to PATH
        run: echo "$(pwd)" >> $GITHUB_PATH
      - name: Run Accessibility Audit (SARIF)
        run: ./a11ysentry --format sarif . > results.sarif
        continue-on-error: true
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: a11ysentry
      - name: Run Accessibility Audit (Text / Exit Codes)
        run: ./a11ysentry .
        continue-on-error: true
