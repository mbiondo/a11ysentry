name: Accessibility Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  security-events: write
  contents: read

jobs:
  a11y:
    name: A11ySentry Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install A11ySentry
        run: |
          curl -sSL https://raw.githubusercontent.com/mbiondo/a11ysentry/main/install.sh | bash

      - name: Run Accessibility Audit (SARIF)
        run: a11ysentry --format sarif --dir . > results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: a11ysentry

      - name: Run Accessibility Audit (Text / Exit Codes)
        run: a11ysentry --dir .
        continue-on-error: true
