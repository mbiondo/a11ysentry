name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/blazor ./adapters/dotnet ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/reactnative ./adapters/unity ./adapters/web
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --exclude-dirs=examples,landing
        env:
          GOWORK: ${{ github.workspace }}/go.work

  test:
    name: Test & Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/blazor ./adapters/dotnet ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/reactnative ./adapters/unity ./adapters/web

      - name: Run Engine Tests
        run: go test -v ./engine/...

      - name: Run Scanner Tests
        run: go test -v ./scanner/...

      - name: Verify CLI Build
        run: go build -v -o /tmp/a11ysentry ./cmd/a11ysentry

  release:
    name: Release
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/blazor ./adapters/dotnet ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/reactnative ./adapters/unity ./adapters/web
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
