name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/blazor ./adapters/dotnet ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/reactnative ./adapters/unity ./adapters/web
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8
      - name: golangci-lint
        env:
          GOWORK: ${{ github.workspace }}/go.work
        run: |
          for mod in engine scanner mcp cmd/a11ysentry adapters/android adapters/blazor adapters/dotnet adapters/flutter adapters/godot adapters/ios adapters/javadesktop adapters/reactnative adapters/unity adapters/web; do
            echo "==> Linting $mod"
            (cd "$mod" && golangci-lint run --timeout=5m ./...)
          done

  test:
    name: Test & Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/blazor ./adapters/dotnet ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/reactnative ./adapters/unity ./adapters/web

      - name: Run Engine Tests
        run: go test -v ./engine/...

      - name: Run Scanner Tests
        run: go test -v ./scanner/...

      - name: Verify CLI Build
        run: go build -v -o /tmp/a11ysentry ./cmd/a11ysentry

  release:
    name: Release
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Create Go Workspace
        run: go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/blazor ./adapters/dotnet ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/reactnative ./adapters/unity ./adapters/web
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
