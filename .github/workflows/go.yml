name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Create Go Workspace
        run: |
          go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/angular ./adapters/blazor ./adapters/django ./adapters/dotnet ./adapters/electron ./adapters/flask ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/pyqt ./adapters/reactnative ./adapters/unity ./adapters/vue ./adapters/web
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m engine/... scanner/... mcp/... cmd/a11ysentry/... adapters/android/... adapters/angular/... adapters/blazor/... adapters/django/... adapters/dotnet/... adapters/electron/... adapters/flask/... adapters/flutter/... adapters/godot/... adapters/ios/... adapters/javadesktop/... adapters/pyqt/... adapters/reactnative/... adapters/unity/... adapters/vue/... adapters/web/...
        env:
          GOWORK: ${{ github.workspace }}/go.work

  test:
    name: Test & Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Create Go Workspace
        run: |
          go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/angular ./adapters/blazor ./adapters/django ./adapters/dotnet ./adapters/electron ./adapters/flask ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/pyqt ./adapters/reactnative ./adapters/unity ./adapters/vue ./adapters/web

      - name: Run Engine Tests
        run: go test -v ./engine/...
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Run Scanner Tests
        run: go test -v ./scanner/...
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Verify CLI Build
        run: go build -v -o /tmp/a11ysentry ./cmd/a11ysentry
        env:
          GOWORK: ${{ github.workspace }}/go.work

  release:
    name: Release
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Create Go Workspace
        run: |
          go work init ./engine ./scanner ./mcp ./cmd/a11ysentry ./adapters/android ./adapters/angular ./adapters/blazor ./adapters/django ./adapters/dotnet ./adapters/electron ./adapters/flask ./adapters/flutter ./adapters/godot ./adapters/ios ./adapters/javadesktop ./adapters/pyqt ./adapters/reactnative ./adapters/unity ./adapters/vue ./adapters/web
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GOWORK: ${{ github.workspace }}/go.work
